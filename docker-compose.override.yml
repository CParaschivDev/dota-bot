services:
  bot:
    command: npm start
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
    volumes:
      - ./:/app
      - /app/node_modules
      - dota_data:/app/src/data
      - dota_logs:/app/logs

  web:
    command: npm run start:web
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
    volumes:
      - ./:/app
      - /app/node_modules
      - dota_data:/app/src/data
      - dota_logs:/app/logs

  caddy:
    ports:
      - '8080:80'
      - '8443:443'

  backup:
    command: sh -c "node scripts/backup-db.js && sleep infinity"
    environment:
      NODE_ENV: development
    volumes:
      - ./:/app
      - /app/node_modules
      - dota_data:/app/src/data
      - dota_backups:/app/backups
