name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  syntax-and-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check bot entrypoint syntax
        run: node --check index.js

      - name: Check web entrypoint syntax
        run: node --check web.js

      - name: Check PM2 config syntax
        run: node --check ecosystem.config.js

      - name: Check admin and backup module syntax
        run: node --check src/web/index.js && node --check src/services/webAdminService.js && node --check src/utils/databaseBackup.js

      - name: Check frontend dashboard script syntax
        run: node --check src/web/public/app.js

      - name: Smoke test backup and web admin routes
        run: node scripts/ci-smoke.js
